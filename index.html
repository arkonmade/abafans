<!doctype html>
<html lang="en-RW">
<head>
  <meta charset="UTF-8" />

  <!-- Basic -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AbaFans | Every Match. Every Fan.</title>

  <meta
    name="description"
    content="AbaFans helps football fans discover what's on tonight, where to watch matches, and what everyone is predicting. Never watch alone. Never miss a moment."
  />

  <meta
    name="keywords"
    content="football Rwanda, World Cup Rwanda, where to watch football Kigali, football predictions Rwanda, sports bars Kigali, football fans Rwanda, live football matches, matchday companion, AbaFans"
  />

  <meta name="author" content="AbaFans" />
  <meta name="robots" content="index, follow, max-image-preview:large" />

  <!-- Canonical -->
  <link rel="canonical" href="https://abafans.com/" />

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

  <!-- Theme -->
  <meta name="theme-color" content="#1F2937" />
  <meta name="color-scheme" content="dark" />

  <!-- Geo -->
  <meta name="geo.region" content="RW" />
  <meta name="geo.country" content="Rwanda" />
  <meta name="geo.placename" content="Kigali" />
  <meta name="ICBM" content="-1.9441,30.0619" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="AbaFans" />
  <meta property="og:title" content="AbaFans | Every Match. Every Fan." />

  <meta
    property="og:description"
    content="What's on tonight? Where should you watch? What is everyone predicting? Join Rwanda's football fan community."
  />

  <meta property="og:url" content="https://abafans.com/" />
  <meta property="og:image" content="https://abafans.com/og-image.jpg" />

  <!-- Twitter/X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="AbaFans | Every Match. Every Fan." />

  <meta
    name="twitter:description"
    content="Never watch alone. Never miss a moment. Discover matches, predictions, and venues with AbaFans."
  />

  <meta
    name="twitter:image"
    content="https://abafans.com/og-image.jpg"
  />

  <!-- App Identity -->
  <meta name="application-name" content="AbaFans" />
  <meta name="apple-mobile-web-app-title" content="AbaFans" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Search Intent -->
  <meta
    name="subject"
    content="Football match discovery, predictions, venues and fan community"
  />

  <meta
    name="category"
    content="Sports, Football, Entertainment, Community"
  />

  <!-- AEO / GEO Signals -->
  <meta
    name="summary"
    content="AbaFans helps football fans answer three questions: What's on tonight? Where should I watch? What is everyone predicting?"
  />

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "AbaFans",
    "url": "https://abafans.com",
    "description": "A football fan platform helping people discover matches, predictions and venues.",
    "inLanguage": "en",
    "keywords": [
      "football",
      "world cup",
      "football predictions",
      "sports bars",
      "where to watch football",
      "football fans Rwanda"
    ],
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://abafans.com/search?q={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- Organization Schema -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "AbaFans",
    "url": "https://abafans.com",
    "logo": "https://abafans.com/logo.png",
    "description": "A football fan community platform built around matchday experiences.",
    "areaServed": {
      "@type": "Country",
      "name": "Rwanda"
    }
  }
  </script>

  <!-- Brand Narrative for AI Search -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Brand",
    "name": "AbaFans",
    "slogan": "Every Match. Every Fan.",
    "description": "A community-first football platform where fans discover matches, predictions and places to watch together.",
    "brandPersonality": [
      "Community First",
      "Companion",
      "Football Culture",
      "Matchday Experience"
    ]
  }
  </script>

</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
